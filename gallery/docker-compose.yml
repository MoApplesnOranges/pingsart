version: "3.9"
services:
  web:
    build: .
    env_file: .env
    ports:
      - "8000:8000" # visit http://localhost:8000
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gallery}
      POSTGRES_USER: ${POSTGRES_USER:-gallery}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gallery}
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  db-data:
